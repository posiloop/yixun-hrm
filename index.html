<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>益循生活 HRM · 多租戶人資系統原型</title>
<style>
  :root{
    --brand:#1f8a4c; --brand-d:#14663a; --brand-l:#e8f5ec; --brand-ll:#f4fbf6;
    --ink:#16211b; --muted:#6b7770; --line:#e3e8e4; --card:#fff; --bg:#f5f7f5;
    --amber:#b9770e; --amber-l:#fdf3e2; --violet:#6d49c9; --violet-l:#efeafb;
    --red:#c5364b; --red-l:#fdebee; --blue:#2f6db0; --blue-l:#e9f1fa;
    --ok:#1f8a4c; --warn:#c5364b; --hold:#b9770e;
    --r:12px; --sh:0 1px 3px rgba(20,60,40,.08),0 1px 2px rgba(20,60,40,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
  .hidden{display:none!important}
  button{font:inherit;cursor:pointer}
  .app{display:flex;flex-direction:column;min-height:100vh}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:40;background:linear-gradient(120deg,var(--brand),var(--brand-d));
    color:#fff;padding:8px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(20,60,40,.18)}
  .logo{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.3px;white-space:nowrap}
  .logo .leaf{width:26px;height:26px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px}
  .topbar .sp{flex:1}
  .selctl{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border-radius:20px;padding:4px 6px 4px 12px}
  .selctl label{font-size:11px;opacity:.85}
  .selctl select{background:#fff;color:var(--ink);border:none;border-radius:14px;padding:5px 8px;font-size:12px;font-weight:600;max-width:44vw}
  .whoami{display:flex;align-items:center;gap:8px;font-size:12px}
  .avatar{width:30px;height:30px;border-radius:50%;background:#fff;color:var(--brand-d);display:flex;align-items:center;justify-content:center;font-weight:800}

  /* layout */
  .body{display:flex;flex:1;min-height:0}
  .nav{width:210px;background:var(--card);border-right:1px solid var(--line);padding:8px;overflow-y:auto;flex-shrink:0}
  .nav .grp{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:12px 8px 4px}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
    padding:9px 10px;border-radius:9px;color:var(--ink);font-size:13.5px;margin-bottom:1px}
  .nav button .tag{width:22px;height:22px;border-radius:6px;background:var(--brand-l);color:var(--brand-d);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0}
  .nav button:hover{background:var(--brand-ll)}
  .nav button.on{background:var(--brand-l);color:var(--brand-d);font-weight:700}
  .nav button.on .tag{background:var(--brand);color:#fff}
  .main{flex:1;min-width:0;overflow-y:auto;padding:16px}
  .wrap{max-width:1100px;margin:0 auto}

  h1.pt{font-size:20px;margin:0 0 2px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  h1.pt .en{font-size:12px;color:var(--muted);font-weight:500}
  .lead{color:var(--muted);margin:0 0 16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-bottom:14px}
  .card h2{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
  .g3{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .g4{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12px;background:var(--brand-ll)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
  .tbl-wrap table th:first-child,.tbl-wrap table td:first-child{padding-left:12px}

  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:700}
  .p-ok{background:var(--brand-l);color:var(--brand-d)}
  .p-hold{background:var(--amber-l);color:var(--amber)}
  .p-warn{background:var(--red-l);color:var(--red)}
  .p-info{background:var(--blue-l);color:var(--blue)}
  .p-gray{background:#eef1ef;color:var(--muted)}

  .btn{background:var(--brand);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px}
  .btn:active{transform:translateY(1px)}
  .btn.sec{background:#fff;color:var(--brand-d);border:1px solid var(--brand)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .btn.warn{background:var(--red)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}

  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
  .stat .k{font-size:12px;color:var(--muted)}
  .stat .v{font-size:24px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
  .stat .d{font-size:11.5px;margin-top:3px}

  input,select.fld,textarea{font:inherit;border:1px solid var(--line);border-radius:8px;padding:9px 10px;width:100%;background:#fff;color:var(--ink)}
  label.f{display:block;font-size:12px;color:var(--muted);margin:0 0 3px}
  .field{margin-bottom:10px}
  .switch{position:relative;width:42px;height:24px;flex-shrink:0}
  .switch input{display:none}
  .switch span{position:absolute;inset:0;background:#cdd4cf;border-radius:20px;transition:.15s}
  .switch span::after{content:"";position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.15s}
  .switch input:checked+span{background:var(--brand)}
  .switch input:checked+span::after{left:21px}

  .rolechip{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
  .r-emp{background:var(--blue-l);color:var(--blue)} .r-sup{background:var(--amber-l);color:var(--amber)}
  .r-hr{background:var(--violet-l);color:var(--violet)} .r-admin{background:var(--red-l);color:var(--red)}

  .phone{max-width:330px;margin:0 auto;border:9px solid #1b241f;border-radius:30px;overflow:hidden;background:#fff;box-shadow:0 10px 30px rgba(0,0,0,.18)}
  .phone .scr{padding:14px;min-height:300px;background:var(--brand-ll)}

  .note{background:var(--brand-ll);border:1px dashed var(--brand);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--brand-d)}
  .gate{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:24px;text-align:center;color:var(--muted);box-shadow:var(--sh)}
  .gate .lock{font-size:36px}
  .cfgbtn{margin-left:auto}

  .matrix td,.matrix th{text-align:center;white-space:normal}
  .matrix td:first-child,.matrix th:first-child{text-align:left}
  .dot{width:16px;height:16px;border-radius:5px;display:inline-block}
  .dot.y{background:var(--brand)} .dot.n{background:#e6eae7}

  .demo-banner{background:#16211b;color:#dfeee6;font-size:12px;padding:6px 12px;text-align:center}
  .demo-banner b{color:#8fe0ab}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#16211b;color:#fff;
    padding:11px 18px;border-radius:10px;font-size:13px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:.2s}
  .toast.show{opacity:1}
  .modal{position:fixed;inset:0;background:rgba(10,20,15,.5);z-index:90;display:none;align-items:center;justify-content:center;padding:16px}
  .modal.show{display:flex}
  .sheet{background:#fff;border-radius:16px;max-width:440px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .sheet .hd{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff}
  .sheet .bd{padding:16px}
  .x{background:none;border:none;font-size:20px;color:var(--muted);line-height:1}

  .navtoggle{display:none;background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:8px;padding:6px 9px;font-size:16px}
  @media(max-width:820px){
    .navtoggle{display:block}
    .nav{position:fixed;top:0;bottom:0;left:0;z-index:60;transform:translateX(-100%);transition:.2s;width:250px;box-shadow:6px 0 24px rgba(0,0,0,.2)}
    .nav.open{transform:none}
    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none}
    .scrim.show{display:block}
    .selctl label{display:none}
    .logo span.full{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <div class="demo-banner">🧪 <b>產品原型 Demo</b>　多租戶人資系統 · 全部為台灣餐飲業<b>虛構測試資料</b> · 上方可切換<b>租戶</b>與<b>角色</b>體驗不同權限</div>
  <div class="topbar">
    <button class="navtoggle" id="navToggle">☰</button>
    <div class="logo"><span class="leaf">🌿</span><span class="full">益循生活 HRM</span></div>
    <div class="sp"></div>
    <div class="selctl">
      <label>租戶</label>
      <select id="tenantSel"></select>
    </div>
    <div class="selctl">
      <label>角色</label>
      <select id="roleSel"></select>
    </div>
    <div class="whoami"><span class="avatar" id="avatar">王</span></div>
  </div>
  <div class="body">
    <div class="scrim" id="scrim"></div>
    <nav class="nav" id="nav"></nav>
    <main class="main"><div class="wrap" id="content"></div></main>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="sheet"><div class="hd"><span id="mTitle">—</span><button class="x" onclick="closeModal()">✕</button></div><div class="bd" id="mBody"></div></div></div>

<script>
/* =========================================================================
   益循生活 HRM — 多租戶人資系統 產品原型（單一 LIFF）
   資料全為台灣餐飲業虛構測試資料，存 localStorage。正式版將接後端資料庫。
   ========================================================================= */

// ---------- 角色與權限（建全 2026-07-05 定義的四級） ----------
const ROLES = {
  employee:{name:'員工', cls:'r-emp', desc:'基本員工操作'},
  supervisor:{name:'主管', cls:'r-sup', desc:'排班、補卡/加班/請假/墊付款審核'},
  hr:{name:'人資', cls:'r-hr', desc:'個資/投保/薪資設置、審核管理'},
  admin:{name:'管理員', cls:'r-admin', desc:'以上全部 + 系統設置'},
};
const RANK={employee:1,supervisor:2,hr:3,admin:4};

// 權限：每個模組定義 view(可看) 與 manage(可管理/設置) 的最低角色
// 另有 approve(審核)、config(調整/新增規則) 細分
const MODS=[
  {k:'home', tag:'★', name:'首頁 / 我的', en:'My Home', view:'employee'},
  {grp:'日常操作'},
  {k:'A', tag:'A', name:'員工基本資料', en:'Employee Profile', view:'employee', manage:'hr', config:'hr'},
  {k:'N', tag:'N', name:'布告欄', en:'Bulletin', view:'employee', manage:'supervisor'},
  {k:'B', tag:'B', name:'定位打卡', en:'GPS Check-in', view:'employee'},
  {k:'C', tag:'C', name:'排班表', en:'Shift Scheduling', view:'employee', manage:'supervisor'},
  {k:'D', tag:'D', name:'業績回報', en:'Sales Report', view:'employee', manage:'supervisor'},
  {k:'E', tag:'E', name:'加班 · 請假', en:'Overtime & Leave', view:'employee', approve:'supervisor', config:'hr'},
  {k:'F', tag:'F', name:'考勤簽核', en:'Approvals', view:'supervisor'},
  {k:'H', tag:'H', name:'墊付款', en:'Advance Payment', view:'employee', approve:'supervisor'},
  {grp:'人資 / 薪酬'},
  {k:'M', tag:'M', name:'部門管理', en:'Departments', view:'hr', manage:'hr'},
  {k:'G', tag:'G', name:'考績獎金', en:'Performance', view:'supervisor', config:'hr'},
  {k:'I', tag:'I', name:'加退保', en:'Insurance', view:'hr'},
  {k:'J', tag:'J', name:'薪資計算', en:'Payroll', view:'hr'},
  {k:'K', tag:'K', name:'電子薪資條', en:'Payslip', view:'employee', manage:'hr'},
  {grp:'分析 / 設置'},
  {k:'L', tag:'L', name:'數據儀表板', en:'Analytics', view:'supervisor'},
  {k:'SET', tag:'⚙', name:'系統設置', en:'Settings', view:'admin'},
];
function can(level){ return RANK[currentRole]>=RANK[level||'employee']; }

// ---------- 多租戶 + 虛構餐飲資料 ----------
const TENANTS={
  yixun:{name:'益循生活（示範）', line:'@yixun-hrm', stores:['台北忠孝店','台中一中店','高雄夢時代店','新竹科技廠櫃']},
  demo2:{name:'順口鹽酥雞（示範）', line:'@shunkou', stores:['板橋文化店','三重重新店']},
};
const LEAVE_TYPES=[
  {k:'annual',name:'特休',on:true,quota:'週年制',pay:'全薪'},
  {k:'sick',name:'普通病假',on:true,quota:'30天/年',pay:'半薪'},
  {k:'personal',name:'事假',on:true,quota:'14天/年',pay:'不給薪'},
  {k:'menstrual',name:'生理假',on:true,quota:'1天/月',pay:'半薪'},
  {k:'family',name:'家庭照顧假',on:true,quota:'併事假7天',pay:'不給薪'},
  {k:'funeral',name:'喪假',on:true,quota:'依親等',pay:'全薪'},
  {k:'marriage',name:'婚假',on:false,quota:'8天',pay:'全薪'},
  {k:'typhoon',name:'颱風假',on:true,quota:'停班公告',pay:'不強制'},
];
// 2026 勞健保級距（虛構近真實）
const INS_BR=[24000,25250,26400,27600,28800,30300,31800,33300,34800,36300,38200,40100,42000,43900,45800,48200,50600,53000];
function bracket(sal){ for(const b of INS_BR){ if(sal<=b) return b;} return INS_BR[INS_BR.length-1]; }

const EMP=[
  {id:'E26P0312',name:'王大明',store:0,dept:'門市',title:'儲備幹部',type:'正職',role:'employee',base:38000,bank:'玉山 0123456789012',state:'在職',start:'2026-01-06'},
  {id:'E25P0455',name:'張雅婷',store:0,dept:'門市',title:'門市副理',type:'正職',role:'supervisor',base:52000,bank:'元大 2148001234567',state:'在職',start:'2025-03-11'},
  {id:'E26K0129',name:'陳美惠',store:1,dept:'廚務',title:'正職廚師',type:'正職',role:'employee',base:41000,bank:'國泰 0789506085623',state:'在職',start:'2026-02-01'},
  {id:'E25T0820',name:'林志豪',store:2,dept:'外場',title:'兼職外場',type:'兼職',role:'employee',base:190,bank:'台新 1102003004005',state:'留停',start:'2025-08-20'},
  {id:'H24001',name:'李文華',store:0,dept:'總部',title:'人資專員',type:'正職',role:'hr',base:46000,bank:'中信 5566778899001',state:'在職',start:'2024-05-02'},
  {id:'A23001',name:'周建國',store:0,dept:'總部',title:'營運總監',type:'正職',role:'admin',base:78000,bank:'兆豐 0090011223344',state:'在職',start:'2023-01-16'},
  {id:'E26P0333',name:'黃品瑄',store:0,dept:'門市',title:'外場',type:'兼職',role:'employee',base:190,bank:'玉山 0123999888777',state:'在職',start:'2026-04-27'},
];
function meFor(role){ // 每個角色對應一個 demo 使用者
  return EMP.find(e=>e.role===role) || EMP[0];
}

// 虛構交易資料（打卡/業績/請假/簽核/墊付/考績/薪資）
const SALES=[
  {store:0,date:'2026/06/15',amt:38600,guests:142,atv:272,food:13900,labor:6200,waste:420},
  {store:3,date:'2026/06/15',amt:31250,guests:118,atv:265,food:12100,labor:5800,waste:610},
  {store:1,date:'2026/06/15',amt:22400,guests:95,atv:236,food:9700,labor:5500,waste:1180},
];
let APPROVALS=[
  {id:1,who:'王大明',store:0,type:'加班',detail:'06/14 晚班延長 · 出餐尖峰',hrs:2,state:'待核'},
  {id:2,who:'陳美惠',store:1,type:'特休',detail:'06/20 全天',hrs:8,state:'待核'},
  {id:3,who:'黃品瑄',store:0,type:'漏打卡',detail:'06/13 下班補登 18:00',hrs:0,state:'待核'},
  {id:4,who:'王大明',store:0,type:'墊付款',detail:'叫貨現金墊付 收據已附',amt:1280,state:'待核'},
];
let ADVANCES=[
  {who:'王大明',date:'06/03',item:'叫貨現金墊付',amt:1280,state:'已核'},
  {who:'王大明',date:'06/12',item:'店務雜支',amt:540,state:'待核'},
];
const LS='hrm_demo_state_v2';
let store=JSON.parse(localStorage.getItem(LS)||'null')||{tenant:'yixun',role:'employee',clock:{},leaveCfg:{},punch:[]};
LEAVE_TYPES.forEach(l=>{ if(store.leaveCfg[l.k]===undefined) store.leaveCfg[l.k]=l.on; });
// 持久化交易資料（真的會存、操作真的生效）
if(!store.approvals) store.approvals=APPROVALS.map(a=>({...a}));
if(!store.advances) store.advances=ADVANCES.map(a=>({...a}));
// 部門（樹狀：parent 指向上層 id；head=主管員編）
if(!store.depts) store.depts=[
  {id:'D0',name:'益循生活總部',parent:null,head:'A23001'},
  {id:'D1',name:'營運部',parent:'D0',head:'A23001'},
  {id:'D2',name:'人資行政部',parent:'D0',head:'H24001'},
  {id:'D3',name:'台北忠孝店',parent:'D1',head:'E25P0455'},
  {id:'D4',name:'台中一中店',parent:'D1',head:'E26K0129'},
  {id:'D5',name:'門市組',parent:'D3',head:'E25P0455'},
  {id:'D6',name:'廚務組',parent:'D3',head:null},
];
if(!store.deptMap) store.deptMap={E26P0312:'D5',E25P0455:'D3',E26K0129:'D4',E25T0820:'D1',H24001:'D2',A23001:'D0',E26P0333:'D5'};
// 布告欄
if(!store.posts) store.posts=[
  {id:1,title:'7月排班注意事項',body:'颱風季來臨，各店請確認緊急聯絡與代班機制。',by:'李文華',role:'hr',date:'2026/07/03',pin:true},
  {id:2,title:'新版電子薪資條上線',body:'7 月起薪資條改由 LINE 推播，請員工確認已加官方帳號。',by:'周建國',role:'admin',date:'2026/07/01',pin:false},
];
if(store.seq===undefined) store.seq=100;
// 排班（key: 員工名_週幾index → {shift,start,end}）
if(!store.shifts) store.shifts={};
// 薪資項目設定（可自訂加給/扣項）
if(!store.payItems) store.payItems=[
  {id:'pi1',name:'本薪',type:'earn',mode:'base',val:0,on:true,sys:true},
  {id:'pi2',name:'加班費',type:'earn',mode:'auto',val:0,on:true,sys:true},
  {id:'pi3',name:'全勤獎金',type:'earn',mode:'fixed',val:2000,on:true},
  {id:'pi4',name:'職務津貼',type:'earn',mode:'fixed',val:3000,on:true},
  {id:'pi5',name:'績效獎金',type:'earn',mode:'formula',val:0,on:true,sys:true},
  {id:'pi6',name:'勞保自付',type:'deduct',mode:'insurance',val:0,on:true,sys:true},
  {id:'pi7',name:'健保自付',type:'deduct',mode:'insurance',val:0,on:true,sys:true},

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1900); }
function modal(title,html){ document.getElementById('mTitle').textContent=title; document.getElementById('mBody').innerHTML=html; document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
window.closeModal=closeModal;
function nt(n){ return '$'+Number(n||0).toLocaleString('en-US'); }
function roleChip(r){ const R=ROLES[r]; return '<span class="rolechip '+R.cls+'">'+R.name+'</span>'; }
function storeName(i){ return TENANTS[currentTenant].stores[i]||'—'; }

// ---------- boot ----------
function boot(){
  const ts=document.getElementById('tenantSel'); ts.innerHTML=Object.entries(TENANTS).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join('');
  ts.value=currentTenant;
  const rs=document.getElementById('roleSel'); rs.innerHTML=Object.entries(ROLES).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join('');
  rs.value=currentRole;
  ts.onchange=e=>{ currentTenant=e.target.value; store.tenant=currentTenant; save(); currentMod='home'; render(); };
  rs.onchange=e=>{ currentRole=e.target.value; store.role=currentRole; save(); currentMod='home'; render(); toast('已切換為「'+ROLES[currentRole].name+'」視角'); };
  document.getElementById('navToggle').onclick=()=>{ document.getElementById('nav').classList.toggle('open'); document.getElementById('scrim').classList.toggle('show'); };
  document.getElementById('scrim').onclick=closeNav;
  render();
}
function closeNav(){ document.getElementById('nav').classList.remove('open'); document.getElementById('scrim').classList.remove('show'); }

function renderNav(){
  const nav=document.getElementById('nav'); let h='';
  MODS.forEach(m=>{
    if(m.grp){ h+=`<div class="grp">${m.grp}</div>`; return; }
    if(!can(m.view)) return;
    h+=`<button class="${m.k===currentMod?'on':''}" onclick="go('${m.k}')"><span class="tag">${m.tag}</span>${m.name}</button>`;
  });
  nav.innerHTML=h;
}
function go(k){ currentMod=k; closeNav(); render(); document.querySelector('.main').scrollTop=0; }
window.go=go;

function render(){
  const me=meFor(currentRole);

const SHIFT_DEFS={ '早':{start:'08:00',end:'16:00',c:'p-ok'}, '中':{start:'11:00',end:'19:00',c:'p-hold'}, '晚':{start:'14:00',end:'22:00',c:'p-info'}, '休':{start:'',end:'',c:'p-gray'}, '':{start:'',end:'',c:'p-gray'} };
const WEEK=['一','二','三','四','五','六','日'];
function shiftKey(name,d){ return currentTenant+'|'+name+'|'+d; }
function getShift(name,d){ return store.shifts[shiftKey(name,d)] || {shift:'',start:'',end:''}; }
PANELS.C=(me)=>{
  const editable=can('supervisor');
  const roster=EMP.filter(e=>e.state!=='離職').map(e=>e.name);
  const cell=(name,d)=>{ const s=getShift(name,d); const def=SHIFT_DEFS[s.shift]||SHIFT_DEFS['']; const lbl=s.shift||'—';

  </div>`);
};
window.editShift=(name,d)=>{ const s=getShift(name,d);
  modal(name+' · 週'+WEEK[d]+' 排班',`
    <div class="field"><label class="f">班別</label>
      <div class="row" id="shiftPick">${Object.keys(SHIFT_DEFS).filter(k=>k!=='').map(k=>`<button class="btn sm ${s.shift===k?'':'ghost'}" onclick="pickShift(this,'${k}')">${k==='休'?'休假':k+' 班'}</button>`).join('')}</div></div>

    </div>

    <div class="row" style="margin-top:8px">
      <button class="btn" onclick="saveShift('${name}',${d})">儲存</button>
      <button class="btn ghost" onclick="clearShift('${name}',${d})">清除此格</button>
      <button class="btn ghost" onclick="closeModal()">取消</button></div>`); };
window.pickShift=(btn,k)=>{ document.querySelectorAll('#shiftPick button').forEach(b=>b.classList.add('ghost')); btn.classList.remove('ghost');
  document.getElementById('sfShift').value=k; const def=SHIFT_DEFS[k];

// J 薪資計算（薪資項目可自訂 → 真的影響計算）
function calcPay(e){
  const base=e.type==='兼職'?e.base*160:e.base;   // 兼職以 160h 估
  const br=bracket(base); const li=Math.round(br*0.0217), hi=Math.round(br*0.0155);
  let earn=0, deduct=0; const lines=[];
  store.payItems.filter(i=>i.on).forEach(i=>{
    let v=0;
    if(i.mode==='base') v=base;
    else if(i.mode==='auto') v=e.type==='兼職'?0:1200;          // 加班費（示範）
    else if(i.mode==='formula') v=e.role==='employee'?3000:0;    // 績效（示範公式）
    else if(i.mode==='fixed') v=i.val;
    else if(i.mode==='insurance') v=(i.name.indexOf('健保')>=0?hi:li);
    if(v===0 && i.mode!=='base') return;
    lines.push({name:i.name,type:i.type,val:v});
    if(i.type==='earn') earn+=v; else deduct+=v;
  });
  return {e,earn,deduct,net:earn-deduct,lines};
}

};
function maxDepth(){ let m=0; function walk(pid,d){ m=Math.max(m,d); deptChildren(pid).forEach(c=>walk(c.id,d+1)); } store.depts.filter(d=>d.parent===null).forEach(r=>walk(r.id,1)); return m; }
function deptOptions(sel,exclude){ return store.depts.filter(d=>d.id!==exclude).map(d=>`<option value="${d.id}" ${sel===d.id?'selected':''}>${d.name}</option>`).join(''); }
function empOptions(sel){ return '<option value="">（未指派）</option>'+EMP.map(e=>`<option value="${e.id}" ${sel===e.id?'selected':''}>${e.name}（${e.title}）</option>`).join(''); }
window.addDept=(parent)=>{ modal('新增部門',`
  <div class="field"><label class="f">部門名稱</label><input id="dName" placeholder="例：外場組"></div>
  <div class="field"><label class="f">上層部門</label><select class="fld" id="dParent"><option value="">（頂層）</option>${deptOptions(parent,null)}</select></div>
  <div class="field"><label class="f">部門主管</label><select class="fld" id="dHead">${empOptions(null)}</select></div>
  <div class="row"><button class="btn" onclick="saveDept(null)">建立</button><button class="btn ghost" onclick="closeModal()">取消</button></div>`); };
window.editDept=(id)=>{ const d=store.depts.find(x=>x.id===id); modal('編輯部門 · '+d.name,`
  <div class="field"><label class="f">部門名稱</label><input id="dName" value="${d.name}"></div>
  <div class="field"><label class="f">上層部門</label><select class="fld" id="dParent"><option value="">（頂層）</option>${deptOptions(d.parent,d.id)}</select></div>
  <div class="field"><label class="f">部門主管</label><select class="fld" id="dHead">${empOptions(d.head)}</select></div>
  <div class="field"><label class="f">指派成員（可多選）</label><div style="max-height:150px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:8px">
    ${EMP.map(e=>`<label style="display:flex;align-items:center;gap:8px;padding:3px 0"><input type="checkbox" style="width:auto" value="${e.id}" ${store.deptMap[e.id]===d.id?'checked':''} onchange="assignMember('${e.id}','${d.id}',this.checked)">${e.name}（${e.title}）</label>`).join('')}</div></div>
  <div class="row"><button class="btn" onclick="saveDept('${id}')">儲存</button><button class="btn ghost" onclick="closeModal()">關閉</button></div>`); };
window.saveDept=(id)=>{ const name=document.getElementById('dName').value.trim(); if(!name){ toast('請輸入部門名稱'); return; }
  const parent=document.getElementById('dParent').value||null; const head=document.getElementById('dHead').value||null;
  if(id){ const d=store.depts.find(x=>x.id===id); d.name=name; d.parent=parent; d.head=head; } else { store.depts.push({id:'D'+nextSeq(),name,parent,head}); }
  save(); closeModal(); toast('部門「'+name+'」已儲存'); render(); };
window.delDept=(id)=>{ const d=store.depts.find(x=>x.id===id); const kids=deptChildren(id).length, mem=deptMembers(id).length;
  if(!confirm('裁撤部門「'+d.name+'」？'+(kids?'（'+kids+'個子部門將移到上層）':'')+(mem?'（'+mem+'名成員將變未分部門）':''))) return;
  deptChildren(id).forEach(c=>c.parent=d.parent); deptMembers(id).forEach(e=>delete store.deptMap[e.id]);
  store.depts=store.depts.filter(x=>x.id!==id); save(); toast('已裁撤「'+d.name+'」'); render(); };
window.assignMember=(eid,did,v)=>{ if(v) store.deptMap[eid]=did; else if(store.deptMap[eid]===did) delete store.deptMap[eid]; save(); };

// N 布告欄
PANELS.N=(me)=>{
  const posts=[...store.posts].sort((a,b)=>(b.pin-a.pin)||(b.id-a.id));
  const canPost=can('supervisor');
  return page('N','布告欄','Bulletin Board',`
  <div class="card"><div class="between"><h2 style="margin:0">📣 公司布告欄</h2>
    ${canPost?'<button class="btn sm" onclick="addPost()">＋ 發布公告</button>':'<span class="pill p-gray">員工檢視</span>'}</div>
    <div style="margin-top:12px">${posts.length?posts.map(p=>`
      <div class="card" style="margin-bottom:10px;${p.pin?'border-color:var(--brand)':''}">
        <div class="between"><div><b>${p.pin?'📌 ':''}${p.title}</b>
          <div style="font-size:12px;color:var(--muted)">${p.by} ${roleChip(p.role)} · ${p.date}</div></div>
          ${canPost?`<div class="row"><button class="btn sm ghost" onclick="pinPost(${p.id})">${p.pin?'取消置頂':'置頂'}</button><button class="btn sm ghost" onclick="editPost(${p.id})">編輯</button><button class="btn sm warn" onclick="delPost(${p.id})">🗑</button></div>`:''}</div>
        <div style="margin-top:8px;white-space:pre-wrap">${p.body}</div>
      </div>`).join(''):'<div style="text-align:center;color:var(--muted);padding:20px">目前沒有公告</div>'}</div>
    <p class="note">主管以上可發布/編輯/刪除/置頂公告，即時推播全體員工 LINE；員工可檢視。</p>
  </div>`);
};
window.addPost=()=>{ modal('發布公告',`
  <div class="field"><label class="f">標題</label><input id="poTitle" placeholder="公告標題"></div>
  <div class="field"><label class="f">內容</label><textarea id="poBody" rows="4" placeholder="公告內容…"></textarea></div>
  <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><input type="checkbox" id="poPin" style="width:auto">置頂</label>
  <div class="row"><button class="btn" onclick="savePost(null)">發布並推播</button><button class="btn ghost" onclick="closeModal()">取消</button></div>`); };
window.editPost=(id)=>{ const p=store.posts.find(x=>x.id===id); modal('編輯公告',`
  <div class="field"><label class="f">標題</label><input id="poTitle" value="${p.title.replace(/"/g,'&quot;')}"></div>
  <div class="field"><label class="f">內容</label><textarea id="poBody" rows="4">${p.body}</textarea></div>
  <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><input type="checkbox" id="poPin" style="width:auto" ${p.pin?'checked':''}>置頂</label>
  <div class="row"><button class="btn" onclick="savePost(${id})">儲存</button><button class="btn ghost" onclick="closeModal()">取消</button></div>`); };
window.savePost=(id)=>{ const title=document.getElementById('poTitle').value.trim(); if(!title){ toast('請輸入標題'); return; }
  const body=document.getElementById('poBody').value.trim(), pin=document.getElementById('poPin').checked;
  if(id){ const p=store.posts.find(x=>x.id===id); p.title=title; p.body=body; p.pin=pin; toast('公告已更新'); }
  else { const me=meFor(currentRole); store.posts.push({id:nextSeq(),title,body,by:me.name,role:currentRole,date:'2026/07/05',pin}); toast('公告已發布並推播'); }
  save(); closeModal(); render(); };
window.pinPost=(id)=>{ const p=store.posts.find(x=>x.id===id); p.pin=!p.pin; save(); toast(p.pin?'已置頂':'已取消置頂'); render(); };
window.delPost=(id)=>{ if(!confirm('刪除此公告？')) return; store.posts=store.posts.filter(x=>x.id!==id); save(); toast('已刪除'); render(); };

    ${EMP.filter(e=>e.state==='在職').map(e=>`<tr><td>${e.name}</td><td>${storeName(e.store)}</td><td>2026/06</td><td><span class="pill p-hold">待推播</span></td><td><button class="btn sm ghost" onclick="payslip('${e.id}')">預覽</button></td></tr>`).join('')}</table></div>

      ${kv('租戶名稱',t.name)}${kv('綁定 LINE 官方帳號',t.line)}${kv('分店數',t.stores.length+' 家')}${kv('方案','企業版（多店）')}

      <p class="note" style="margin-top:12px">每個租戶（客戶）資料完全隔離，綁自己的 LINE 官方帳號、自助開通。</p>

      <button class="btn sm" style="margin-top:10px" onclick="toast('（示範）新增分店')">＋ 新增分店</button>
    </div>
  </div>
  <div class="card"><h2>🔐 角色權限矩陣（可自訂）</h2>
    <div class="tbl-wrap"><table class="matrix"><tr><th>模組 \\ 角色</th><th>員工</th><th>主管</th><th>人資</th><th>管理員</th></tr>
    ${MODS.filter(m=>m.k&&m.k!=='home'&&m.k!=='SET').map(m=>`<tr><td>${m.tag} ${m.name}</td>
      ${['employee','supervisor','hr','admin'].map(r=>`<td><label class="switch"><input type="checkbox" ${RANK[r]>=RANK[m.view]?'checked':''} onchange="toast('（示範）權限已更新')"><span></span></label></td>`).join('')}</tr>`).join('')}</table></div>

  </div>
  <div class="card"><h2>🧩 各模組規則設定</h2>
    <div class="grid g3">
      ${[['假別政策','E'],['考核 / 獎金公式','G'],['投保級距表','I'],['薪資計算規則','J'],['打卡 GPS 範圍','B'],['自訂欄位','A']].map(x=>`<button class="btn ghost" style="justify-content:flex-start" onclick="go('${x[1]}')">${x[0]} →</button>`).join('')}
    </div>
    <p class="note" style="margin-top:12px">所有規則都做成「資料可設定」而非「程式寫死」——接新客戶不必改程式碼。</p>
  </div>`);
};

// ---------- 小工具 ----------
function page(tag,name,en,inner){ return `<h1 class="pt"><span class="tag" style="width:30px;height:30px;font-size:15px">${tag}</span>${name} <span class="en">${en}</span></h1>${inner}`; }
function kv(k,v){ return `<div class="field"><label class="f">${k}</label><div style="font-weight:600">${v}</div></div>`; }

// live clock on B
setInterval(()=>{ const c=document.getElementById('clk'); if(c){ const n=new Date(); c.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); } },1000);

boot();
</script>

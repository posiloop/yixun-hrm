<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>益循生活 HRM · 多租戶人資系統原型</title>
<style>
  :root{
    --brand:#1f8a4c; --brand-d:#14663a; --brand-l:#e8f5ec; --brand-ll:#f4fbf6;
    --ink:#16211b; --muted:#6b7770; --line:#e3e8e4; --card:#fff; --bg:#f5f7f5;
    --amber:#b9770e; --amber-l:#fdf3e2; --violet:#6d49c9; --violet-l:#efeafb;
    --red:#c5364b; --red-l:#fdebee; --blue:#2f6db0; --blue-l:#e9f1fa;
    --ok:#1f8a4c; --warn:#c5364b; --hold:#b9770e;
    --r:12px; --sh:0 1px 3px rgba(20,60,40,.08),0 1px 2px rgba(20,60,40,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
  img,table{max-width:100%}
  .hidden{display:none!important}
  button{font:inherit;cursor:pointer}
  .app{display:flex;flex-direction:column;min-height:100vh}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:40;background:linear-gradient(120deg,var(--brand),var(--brand-d));
    color:#fff;padding:8px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(20,60,40,.18)}
  .logo{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.3px;white-space:nowrap}
  .logo .leaf{width:26px;height:26px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px}
  .topbar .sp{flex:1}
  .selctl{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border-radius:20px;padding:4px 6px 4px 12px}
  .selctl label{font-size:11px;opacity:.85}
  .selctl select{background:#fff;color:var(--ink);border:none;border-radius:14px;padding:5px 8px;font-size:12px;font-weight:600;max-width:44vw}
  .whoami{display:flex;align-items:center;gap:8px;font-size:12px}
  .avatar{width:30px;height:30px;border-radius:50%;background:#fff;color:var(--brand-d);display:flex;align-items:center;justify-content:center;font-weight:800}

  /* layout */
  .body{display:flex;flex:1;min-height:0}
  .nav{width:210px;background:var(--card);border-right:1px solid var(--line);padding:8px;overflow-y:auto;flex-shrink:0}
  .nav .grp{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:12px 8px 4px}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
    padding:9px 10px;border-radius:9px;color:var(--ink);font-size:13.5px;margin-bottom:1px}
  .nav button .tag{width:22px;height:22px;border-radius:6px;background:var(--brand-l);color:var(--brand-d);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0}
  .nav button:hover{background:var(--brand-ll)}
  .nav button.on{background:var(--brand-l);color:var(--brand-d);font-weight:700;position:relative}
  .nav button.on::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,var(--brand),var(--brand-d))}
  .nav button.on .tag{background:var(--brand);color:#fff;box-shadow:0 2px 6px rgba(31,138,76,.35)}
  .nav button:active{transform:scale(.98)}
  .main{flex:1;min-width:0;overflow-y:auto;padding:16px}
  .wrap{max-width:1100px;margin:0 auto}

  h1.pt{font-size:20px;margin:0 0 2px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  h1.pt .en{font-size:12px;color:var(--muted);font-weight:500}
  h1.pt .tag{background:linear-gradient(135deg,var(--brand),var(--brand-d))!important;color:#fff!important;box-shadow:0 3px 8px rgba(31,138,76,.3)}
  .card h2{letter-spacing:.2px}
  .lead{color:var(--muted);margin:0 0 16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-bottom:14px}
  .card h2{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
  .g3{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .g4{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12px;background:var(--brand-ll)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
  .tbl-wrap table th:first-child,.tbl-wrap table td:first-child{padding-left:12px}

  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:700}
  .p-ok{background:var(--brand-l);color:var(--brand-d)}
  .p-hold{background:var(--amber-l);color:var(--amber)}
  .p-warn{background:var(--red-l);color:var(--red)}
  .p-info{background:var(--blue-l);color:var(--blue)}
  .p-gray{background:#eef1ef;color:var(--muted)}

  .btn{background:var(--brand);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px;
    transition:transform .12s cubic-bezier(.34,1.56,.64,1),box-shadow .15s,filter .15s;box-shadow:0 1px 2px rgba(20,60,40,.12)}
  .btn:hover{filter:brightness(1.06);box-shadow:0 3px 10px rgba(31,138,76,.28);transform:translateY(-1px)}
  .btn:active{transform:translateY(1px) scale(.98)}
  .btn.sec{background:#fff;color:var(--brand-d);border:1px solid var(--brand)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .btn.warn{background:var(--red)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}

  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--brand),var(--brand-d));opacity:.85}
  .stat:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(20,60,40,.12)}
  @media(prefers-reduced-motion:reduce){ .btn,.stat,.switch span,.switch span::after{transition:none} .btn:hover,.stat:hover{transform:none} }
  .stat .k{font-size:12px;color:var(--muted)}
  .stat .v{font-size:24px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
  .stat .d{font-size:11.5px;margin-top:3px}

  input,select.fld,textarea{font:inherit;border:1px solid var(--line);border-radius:8px;padding:9px 10px;width:100%;background:#fff;color:var(--ink)}
  label.f{display:block;font-size:12px;color:var(--muted);margin:0 0 3px}
  .field{margin-bottom:10px}
  .switch{display:inline-block;position:relative;width:42px;height:24px;flex-shrink:0;vertical-align:middle}
  .switch input{display:none}
  .switch span{position:absolute;inset:0;background:#cdd4cf;border-radius:20px;transition:.15s}
  .switch span::after{content:"";position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.15s}
  .switch input:checked+span{background:var(--brand)}
  .switch input:checked+span::after{left:21px}

  .rolechip{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
  .r-emp{background:var(--blue-l);color:var(--blue)} .r-sup{background:var(--amber-l);color:var(--amber)}
  .r-hr{background:var(--violet-l);color:var(--violet)} .r-admin{background:var(--red-l);color:var(--red)}

  .phone{max-width:330px;margin:0 auto;border:9px solid #1b241f;border-radius:30px;overflow:hidden;background:#fff;box-shadow:0 10px 30px rgba(0,0,0,.18)}
  .phone .scr{padding:14px;min-height:300px;background:var(--brand-ll)}

  .note{background:var(--brand-ll);border:1px dashed var(--brand);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--brand-d)}
  .gate{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:24px;text-align:center;color:var(--muted);box-shadow:var(--sh)}
  .gate .lock{font-size:36px}
  .cfgbtn{margin-left:auto}

  .matrix td,.matrix th{text-align:center;white-space:normal}
  .matrix td:first-child,.matrix th:first-child{text-align:left}
  .dot{width:16px;height:16px;border-radius:5px;display:inline-block}
  .dot.y{background:var(--brand)} .dot.n{background:#e6eae7}

  .demo-banner{background:#16211b;color:#dfeee6;font-size:12px;padding:6px 12px;text-align:center}
  .demo-banner b{color:#8fe0ab}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#16211b;color:#fff;
    padding:11px 18px;border-radius:10px;font-size:13px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:.2s}
  .toast.show{opacity:1;animation:toastPop .25s cubic-bezier(.34,1.56,.64,1)}
  @keyframes toastPop{from{transform:translateX(-50%) translateY(10px) scale(.9)}to{transform:translateX(-50%) translateY(0) scale(1)}}
  .card{animation:fadeUp .22s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .modal{position:fixed;inset:0;background:rgba(10,20,15,.5);z-index:90;display:none;align-items:center;justify-content:center;padding:16px}
  .modal.show{display:flex}
  .sheet{background:#fff;border-radius:16px;max-width:440px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .sheet .hd{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff}
  .sheet .bd{padding:16px}
  .x{background:none;border:none;font-size:20px;color:var(--muted);line-height:1}

  .navtoggle{display:none;background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:8px;padding:6px 9px;font-size:16px}
  @media(max-width:820px){
    .navtoggle{display:block}
    .nav{position:fixed;top:0;bottom:0;left:0;z-index:60;transform:translateX(-100%);transition:.2s;width:250px;box-shadow:6px 0 24px rgba(0,0,0,.2)}
    .nav.open{transform:none}
    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none}
    .scrim.show{display:block}
    .selctl label{display:none}
    .logo span.full{display:none}
    .topbar{gap:6px;padding:8px}
    .selctl{gap:2px;padding:3px 4px 3px 6px}
    .selctl select{max-width:30vw;padding:5px 4px;font-size:12px}
    .main{padding:12px 10px}
    .g2,.g3,.g4{grid-template-columns:1fr}
    .card{padding:13px}
    h1.pt .en{width:100%}
  }
  @media(max-width:400px){ .selctl select{max-width:27vw} .logo .leaf{display:none} }
</style>
</head>
<body>
<div class="app">
  <div class="demo-banner">🧪 <b>產品原型 Demo</b>　多租戶人資系統 · 全部為台灣餐飲業<b>虛構測試資料</b> · 上方可切換<b>租戶</b>與<b>角色</b>體驗不同權限</div>
  <div class="topbar">
    <button class="navtoggle" id="navToggle">☰</button>
    <div class="logo"><span class="leaf">🌿</span><span class="full">益循生活 HRM</span></div>
    <div class="sp"></div>
    <div class="selctl">
      <label>租戶</label>
      <select id="tenantSel"></select>
    </div>
    <div class="selctl">
      <label>角色</label>
      <select id="roleSel"></select>
    </div>
    <button id="bell" onclick="openNotifs()" style="position:relative;background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:9px;padding:6px 9px;font-size:16px;cursor:pointer">🔔<span id="bellBadge" style="display:none;position:absolute;top:-4px;right:-4px;background:#ff5a5f;color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:9px;align-items:center;justify-content:center;padding:0 3px">0</span></button>
    <div class="whoami"><span class="avatar" id="avatar">王</span></div>
  </div>
  <div class="body">
    <div class="scrim" id="scrim"></div>
    <nav class="nav" id="nav"></nav>
    <main class="main"><div class="wrap" id="content"></div>
      <div style="max-width:1100px;margin:26px auto 0;padding:16px 4px;border-top:1px solid var(--line);display:flex;gap:14px;flex-wrap:wrap;align-items:center;justify-content:center;font-size:13px;color:var(--muted)">
        <span style="font-weight:700">益循 HRM 產品站：</span>
        <a href="sales/" style="color:var(--brand);text-decoration:none">🛒 銷售頁</a>
        <a href="line/" style="color:var(--brand);text-decoration:none">📱 LINE 官方帳號規劃</a>
        <a href="marketing/" style="color:var(--brand);text-decoration:none">📣 FB/IG 社群內容包</a>
        <span style="opacity:.6">· 這裡是可操作的系統試玩</span>
      </div>
    </main>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="sheet"><div class="hd"><span id="mTitle">—</span><button class="x" onclick="closeModal()">✕</button></div><div class="bd" id="mBody"></div></div></div>

<script>
/* =========================================================================
   益循生活 HRM — 多租戶人資系統 產品原型（單一 LIFF）
   資料全為台灣餐飲業虛構測試資料，存 localStorage。正式版將接後端資料庫。
   ========================================================================= */

// ---------- 角色與權限（建全 2026-07-05 定義的四級） ----------
const ROLES = {
  employee:{name:'員工', cls:'r-emp', desc:'基本員工操作'},
  supervisor:{name:'主管', cls:'r-sup', desc:'排班、補卡/加班/請假/墊付款審核'},
  hr:{name:'人資', cls:'r-hr', desc:'個資/投保/薪資設置、審核管理'},
  admin:{name:'管理員', cls:'r-admin', desc:'以上全部 + 系統設置'},
};
const RANK={employee:1,supervisor:2,hr:3,admin:4};

// 權限：每個模組定義 view(可看) 與 manage(可管理/設置) 的最低角色
// 另有 approve(審核)、config(調整/新增規則) 細分
const MODS=[
  {k:'home', tag:'★', name:'首頁 / 我的', en:'My Home', view:'employee'},
  {grp:'日常操作'},
  {k:'R', tag:'R', name:'我的專區', en:'My Self-Service', view:'employee'},
  {k:'A', tag:'A', name:'員工基本資料', en:'Employee Profile', view:'employee', manage:'hr', config:'hr'},
  {k:'N', tag:'N', name:'布告欄', en:'Bulletin', view:'employee', manage:'supervisor'},
  {k:'B', tag:'B', name:'定位打卡', en:'GPS Check-in', view:'employee'},
  {k:'C', tag:'C', name:'排班表', en:'Shift Scheduling', view:'employee', manage:'supervisor'},
  {k:'D', tag:'D', name:'業績回報', en:'Sales Report', view:'employee', manage:'supervisor'},
  {k:'E', tag:'E', name:'加班 · 請假', en:'Overtime & Leave', view:'employee', approve:'supervisor', config:'hr'},
  {k:'F', tag:'F', name:'考勤簽核', en:'Approvals', view:'supervisor'},
  {k:'H', tag:'H', name:'墊付款', en:'Advance Payment', view:'employee', approve:'supervisor'},
  {grp:'人資 / 薪酬'},
  {k:'M', tag:'M', name:'部門管理', en:'Departments', view:'hr', manage:'hr'},
  {k:'O', tag:'O', name:'教育訓練', en:'Training', view:'employee', manage:'hr'},
  {k:'P', tag:'P', name:'福利管理', en:'Benefits', view:'employee', manage:'hr'},
  {k:'Q', tag:'Q', name:'勞檢報表', en:'Labor Audit', view:'hr', config:'hr'},
  {k:'G', tag:'G', name:'考績獎金', en:'Performance', view:'supervisor', config:'hr'},
  {k:'I', tag:'I', name:'加退保', en:'Insurance', view:'hr'},
  {k:'J', tag:'J', name:'薪資計算', en:'Payroll', view:'hr'},
  {k:'K', tag:'K', name:'電子薪資條', en:'Payslip', view:'employee', manage:'hr'},
  {grp:'分析 / 設置'},
  {k:'L', tag:'L', name:'數據儀表板', en:'Analytics', view:'supervisor'},
  {k:'SET', tag:'⚙', name:'系統設置', en:'Settings', view:'admin'},
];
function can(level){ return RANK[currentRole]>=RANK[level||'employee']; }
// 模組層級權限（可在系統設置逐格覆寫；未設則依角色階級預設）
function canMod(modKey){ const m=MODS.find(x=>x.k===modKey); if(!m) return true;
  const ov=store.perm[currentRole]&&store.perm[currentRole][modKey];
  if(ov===true) return true; if(ov===false) return false;
  return can(m.view); }
function permDefault(role,modKey){ const m=MODS.find(x=>x.k===modKey); return m?RANK[role]>=RANK[m.view]:false; }
function permEffective(role,modKey){ const ov=store.perm[role]&&store.perm[role][modKey]; return ov===undefined?permDefault(role,modKey):ov; }

// ---------- 多租戶 + 虛構餐飲資料 ----------
const TENANTS={
  yixun:{name:'益循生活（示範·滿載）', line:'@yixun-hrm', stores:['台北忠孝店','台中一中店','高雄夢時代店','新竹科技廠櫃']},
  demo2:{name:'順口鹽酥雞（示範）', line:'@shunkou', stores:['板橋文化店','三重重新店']},
  blank:{name:'✨ 新租戶（空白·模擬剛購買）', line:'', stores:[]},
};
const LEAVE_TYPES=[
  {k:'annual',name:'特休',on:true,quota:'週年制',pay:'全薪'},
  {k:'sick',name:'普通病假',on:true,quota:'30天/年',pay:'半薪'},
  {k:'personal',name:'事假',on:true,quota:'14天/年',pay:'不給薪'},
  {k:'menstrual',name:'生理假',on:true,quota:'1天/月',pay:'半薪'},
  {k:'family',name:'家庭照顧假',on:true,quota:'併事假7天',pay:'不給薪'},
  {k:'funeral',name:'喪假',on:true,quota:'依親等',pay:'全薪'},
  {k:'marriage',name:'婚假',on:false,quota:'8天',pay:'全薪'},
  {k:'typhoon',name:'颱風假',on:true,quota:'停班公告',pay:'不強制'},
];
// 2026 勞健保級距（虛構近真實）
// 2026(115年) 勞保投保薪資分級表：29,500(基本工資)～45,800(上限)，共11級
const INS_BR=[29500,30300,31800,33300,34800,36300,38200,40100,42000,43900,45800];
// 各險上限（2026）：勞保 45,800／勞退提繳 150,000／健保 313,000
const CAP_LABOR=45800, CAP_PENSION=150000, CAP_HEALTH=313000;
function bracket(sal){ for(const b of INS_BR){ if(sal<=b) return b;} return INS_BR[INS_BR.length-1]; }

const SEED_EMP=[
  {id:'E26P0312',name:'王大明',store:0,dept:'門市',title:'儲備幹部',type:'正職',role:'employee',base:38000,bank:'玉山 0123456789012',state:'在職',start:'2026-01-06'},
  {id:'E25P0455',name:'張雅婷',store:0,dept:'門市',title:'門市副理',type:'正職',role:'supervisor',base:52000,bank:'元大 2148001234567',state:'在職',start:'2025-03-11'},
  {id:'E26K0129',name:'陳美惠',store:1,dept:'廚務',title:'正職廚師',type:'正職',role:'employee',base:41000,bank:'國泰 0789506085623',state:'在職',start:'2026-02-01'},
  {id:'E25T0820',name:'林志豪',store:2,dept:'外場',title:'兼職外場',type:'兼職',role:'employee',base:190,bank:'台新 1102003004005',state:'留停',start:'2025-08-20'},
  {id:'H24001',name:'李文華',store:0,dept:'總部',title:'人資專員',type:'正職',role:'hr',base:46000,bank:'中信 5566778899001',state:'在職',start:'2024-05-02'},
  {id:'A23001',name:'周建國',store:0,dept:'總部',title:'營運總監',type:'正職',role:'admin',base:78000,bank:'兆豐 0090011223344',state:'在職',start:'2023-01-16'},

window.delDoc=(id,docId)=>{ const e=EMP.find(x=>x.id===id); if(!confirm('刪除此文件？')) return; e.docs=e.docs.filter(x=>x.id!==docId); save(); toast('已刪除'); docManager(id); };
// 出勤異常掃描 + 自動通知
function scanAnomalies(){ const out=[];
  EMP.filter(e=>e.state==='在職').forEach(e=>{ const c=store.clock[e.id]; const pa=punchAnalysis(e);
    if(pa.in && pa.late>0){ // 今日實際打卡→即時遲到（優先，最準）
      out.push({emp:e,type:'遲到',detail:'今日 '+pa.in+' 打卡 vs 排定 '+pa.sched.start+'，遲到 '+pa.late+' 分（'+pa.sched.src+'）'});
    } else { const at=attend(e.id); if(at.lateMin>store.attendCfg.lateGrace) out.push({emp:e,type:'遲到',detail:'本月累計遲到 '+at.late+' 次·'+at.lateMin+' 分'}); }
    if(pa.in && pa.out && pa.early>0) out.push({emp:e,type:'早退',detail:'今日 '+pa.out+' 下班 vs 排定 '+pa.sched.end+'，早退 '+pa.early+' 分'});
    if(c&&c.in&&!c.out) out.push({emp:e,type:'缺卡',detail:'今日只有上班打卡、無下班打卡'});
  });
  return out; }
window.notifyAnomalies=()=>{ const a=scanAnomalies(); if(!a.length){ toast('目前無出勤異常 🎉'); return; }
  a.forEach(x=>notify('⚠️','出勤異常：'+x.type, x.emp.name+' — '+x.detail));
  toast('已掃描並推播 '+a.length+' 筆出勤異常通知'); render(); };
window.empLeave=(id)=>{ const e=EMP.find(x=>x.id===id); if(!confirm('辦理「'+e.name+'」離職封存？（自動退保、結算年資特休）')) return; e.state='離職'; e.leaveDate=e.leaveDate||'2026-07-05'; delete store.deptMap[id]; save(); toast(e.name+' 已離職封存'); render(); };
// 年資（由到職日算 + 手動調整「日數」）
function seniority(e){ if(!e.start) return '—'; const s=new Date(e.start), n=new Date(2026,6,5);
  let days=Math.floor((n-s)/86400000)+(+e.seniorityAdj||0); if(days<0)days=0;
  const y=Math.floor(days/365), m=Math.floor((days%365)/30), d=days%365%30; return y+'年'+m+'月'+d+'日'; }
// 硬刪除員工（誤建/未報到用）+ 連帶清理
function empHardDelete(id){ const e=EMP.find(x=>x.id===id); if(!e) return;
  const idx=EMP.indexOf(e); EMP.splice(idx,1);
  delete store.deptMap[id]; delete store.leaveBal[id]; delete store.scores[id]; delete store.bonus[id]; delete store.attendance[id];
  store.approvals=store.approvals.filter(a=>a.empId!==id); save(); }
// 修改工號（連帶更新所有以工號為 key 的資料）
function empRenameId(oldId,newId){ const e=EMP.find(x=>x.id===oldId); if(!e) return false; if(EMP.some(x=>x.id===newId&&x!==e)){ toast('工號已存在'); return false; }
  e.id=newId; ['deptMap','leaveBal','scores','bonus','attendance'].forEach(k=>{ if(store[k][oldId]!==undefined){ store[k][newId]=store[k][oldId]; delete store[k][oldId]; } });
  store.approvals.forEach(a=>{ if(a.empId===oldId) a.empId=newId; }); return true; }

// 本月考勤（由員編衍生示範值，一次種入後持久化；遲到/早退依 attendCfg 判定）
function attend(empId){ if(!store.attendance[empId]){ const seed=[...empId].reduce((a,c)=>a+c.charCodeAt(0),0);
  store.attendance[empId]={days:22-(seed%3),late:seed%4,lateMin:(seed%4)*8,early:seed%2,ot:(seed%5)+((seed%2)?1:3)}; }
  return store.attendance[empId]; }
// 打卡→考勤：由「實際打卡時間」對「排定班別」即時算遲到/早退/加班（非種子）
function toMin(t){ if(!t||!/^\d{1,2}:\d{2}$/.test(t)) return null; const [h,m]=t.split(':').map(Number); return h*60+m; }
function schedFor(me){ // 取本週第一筆實際排班為排定時間；無排班用班別預設
  if(store.shifts){ for(let i=0;i<7;i++){ const s=getShift(me.name,i); if(s&&s.start&&s.end) return {start:s.start,end:s.end,src:'排班表'}; } }
  const sd=store.shiftDefs.find(x=>x.k&&x.k!=='休'&&x.start&&x.end); return sd?{start:sd.start,end:sd.end,src:'班別預設'}:{start:'09:00',end:'18:00',src:'標準'}; }
function punchAnalysis(me){ const c=store.clock[me.id]||{}; const ac=store.attendCfg; const sched=schedFor(me);
  const inM=toMin(c.in),outM=toMin(c.out),sM=toMin(sched.start),eM=toMin(sched.end);
  let late=0,early=0,worked=null,ot=0;
  if(inM!=null&&sM!=null){ const allow=sM+(ac.flex?(+ac.flexMin||0):(+ac.lateGrace||0)); late=Math.max(0,inM-allow); }
  if(outM!=null&&eM!=null) early=Math.max(0,eM-outM);
  if(inM!=null&&outM!=null){ worked=Math.max(0,(outM-inM)/60-(+ac.breakAuto||0)); ot=Math.max(0,worked-(+ac.otThreshold||8)); }
  return {sched,in:c.in||null,out:c.out||null,late,early,worked:worked==null?null:Math.round(worked*10)/10,ot:Math.round(ot*10)/10}; }

// E 加班請假（真的送單 → 進 F 簽核佇列；核准回寫餘額）
// 勞基法特休（依年資，回小時）：6m→3天,1y→7,2y→10,3-4y→14,5-9y→15,10y+→15+每年1天上限30天
function statutoryAnnualDays(e){ if(!e||!e.start) return 0; const s=new Date(e.start),n=new Date(2026,6,5); const days=Math.floor((n-s)/86400000)+(+e.seniorityAdj||0); const y=days/365;
  if(y<0.5)return 0; if(y<1)return 3; if(y<2)return 7; if(y<3)return 10; if(y<5)return 14; if(y<10)return 15; return Math.min(30,15+Math.floor(y-9)); }
function leaveBal(empId){ if(!store.leaveBal[empId]){ const e=EMP.find(x=>x.id===empId); let annual=statutoryAnnualDays(e)*8; if(e&&e.partTime) annual=Math.round(annual/2); store.leaveBal[empId]={annual,comp:10}; } return store.leaveBal[empId]; }

function applyLeaveBalance(a,dir){ // dir=-1 扣, +1 還
  if(!a.empId) return; const b=leaveBal(a.empId);
  if(a.type==='特休') b.annual=Math.max(0,b.annual+dir*a.hrs);
  else if(a.type==='加班') b.comp=Math.max(0,b.comp+dir*(-a.hrs)); // 加班核准=補休增加（dir=-1 時 +hrs）
}
window.approve=(id,ok)=>{ const a=store.approvals.find(x=>x.id===id); const was=a.state; a.state=ok?'已核准':'已退回';
  if(ok && was!=='已核准') applyLeaveBalance(a,-1);   // 核准→扣特休/加班→補休+
  if(ok && was!=='已核准' && a.kind==='swap'){ // 換班核准 → 班表實際對調
    const emp=EMP.find(e=>e.id===a.empId)||{name:a.who}; const k1=shiftKey(emp.name,a.day), k2=shiftKey(a.targetName,a.day);
    const s1=store.shifts[k1], s2=store.shifts[k2]; store.shifts[k1]=s2; store.shifts[k2]=s1;
    notify('🔄','換班已核准·班表已對調', a.who+' ⇄ '+a.targetName+'　'+WEEK[a.day]+' 班別已對調'); }
  notify(ok?'✅':'↩️', a.type+(ok?' 已核准':' 已退回'), '@'+a.who+'：你的「'+a.type+'」申請'+(ok?'已核准':'被退回'));
  save(); toast(a.who+' 的'+a.type+' '+(ok?'已核准':'已退回')); render(); };
// 換班申請（員工發起 → 主管核准 → 班表對調）
window.reqSwap=()=>{ const me=meFor(currentRole); const myDays=[];
  for(let d=0;d<7;d++){ const s=getShift(me.name,d); if(s.shift&&s.shift!=='休') myDays.push({d,label:WEEK[d]+'（'+s.shift+' 班）'}); }
  if(!myDays.length){ toast('你本週沒有排定班別可換'); return; }
  const others=EMP.filter(e=>e.state!=='離職'&&e.id!==me.id);
  modal('🔄 申請換班',`
    <div class="field"><label class="f">我要換掉的班</label><select class="fld" id="swDay">${myDays.map(x=>`<option value="${x.d}">${x.label}</option>`).join('')}</select></div>
    <div class="field"><label class="f">對調對象</label><select class="fld" id="swTarget">${others.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select></div>
    <div class="field"><label class="f">事由</label><input id="swReason" placeholder="臨時有事，想與同事對調"></div>
    <div class="row"><button class="btn" onclick="submitSwap()">送出換班申請</button><button class="btn ghost" onclick="closeModal()">取消</button></div>
    <p class="note" style="margin-top:8px">送出後對方與主管收到通知；主管核准後班表自動對調、雙方即時看到新班。</p>`); };
window.submitSwap=()=>{ const me=meFor(currentRole); const d=+document.getElementById('swDay').value; const t=EMP.find(e=>e.id===document.getElementById('swTarget').value); const reason=document.getElementById('swReason').value;
  const myS=getShift(me.name,d), tS=getShift(t.name,d);
  store.approvals.push({id:nextSeq(),empId:me.id,who:me.name,store:me.store,type:'換班',kind:'swap',day:d,targetId:t.id,targetName:t.name,detail:WEEK[d]+'：'+me.name+'('+(myS.shift||'休')+') ⇄ '+t.name+'('+(tS.shift||'休')+')'+(reason?'　'+reason:''),state:'待核'});
  notify('🔄','新換班申請', me.name+' 想與 '+t.name+' 對調 '+WEEK[d]+' 班別，待主管核准');
  save(); closeModal(); toast('換班申請已送出，進主管簽核'); render(); };
window.unapprove=(id)=>{ const a=store.approvals.find(x=>x.id===id); if(a.state==='已核准') applyLeaveBalance(a,+1); // 撤銷核准→還回
  a.state='待核'; save(); toast('已撤銷「'+a.who+' 的'+a.type+'」回待核'); render(); };
window.delApproval=(id)=>{ const a=store.approvals.find(x=>x.id===id); if(!confirm('確定刪除「'+a.who+' 的'+a.type+'」這筆紀錄？')) return; store.approvals=store.approvals.filter(x=>x.id!==id); save(); toast('已刪除該簽核紀錄'); render(); };

const GRADE_PT={A:100,'B+':85,B:75,C:60,D:40};
const BONUS_PER_PT=60;   // 每分對應獎金（可視為公式係數）
function apprScore(empId){ const sc=store.scores[empId]||{}; let tot=0,wsum=0;
  store.apprItems.forEach(it=>{ const g=sc[it.id]; if(g){ tot+=GRADE_PT[g]*it.weight; wsum+=it.weight; } });
  return wsum?Math.round(tot/wsum):0; }
function apprBonus(empId){ const s=apprScore(empId); return s?Math.round(s*BONUS_PER_PT/10)*10:0; }

    <p class="note" style="margin-top:12px">考核項目與權重可自訂；權重建議合計 100%。分數×係數＝績效獎金，直接帶入薪資計算。</p></div>`:'';
  const scoreEmps=EMP.filter(e=>e.state==='在職'&&e.role==='employee');

        <td class="num"><b>${apprScore(e.id)||'—'}</b></td><td class="num" style="color:var(--brand)"><b>${apprBonus(e.id)?nt(apprBonus(e.id)):'—'}</b></td></tr>`;}).join('')}</table></div>

// J 薪資計算（薪資項目 + 細節旗標 + 保險設置 → 真的影響計算）
function roundBy(v){ const m=store.payrollCfg.rounding; return m==='floor'?Math.floor(v):m==='ceil'?Math.ceil(v):Math.round(v); }
// 保險各項目自付/雇主負擔明細（勞保/災保/勞退/健保/眷屬）
function insDetail(e){ const base=e.type==='兼職'?e.base*160:e.base; const ic=store.insCfg; const dep=Math.min(3,+e.dependents||0);
  // 三險上限分開（2026）：勞保封頂 45,800；勞退 6% 算實際工資到 150,000；健保到 313,000
  const laborBr = Math.min(e.insBr||bracket(base), CAP_LABOR);          // 勞保投保薪資（級距表，上限45,800）
  const pensionBase = Math.min(Math.max(base, e.insBr||0), CAP_PENSION); // 勞退提繳工資（薪水越高提越多，15萬封頂）
  const healthBase  = Math.min(Math.max(base, e.insBr||0), CAP_HEALTH);  // 健保投保金額（到31.3萬）
  return {
    br: laborBr,
    pensionBase, healthBase,
    laborSelf: ic.labor.on?roundBy(laborBr*ic.labor.rate*0.2):0,       // 勞保：員工自付約 20%
    laborEmp:  ic.labor.on?roundBy(laborBr*ic.labor.rate*0.7):0,       // 雇主約 70%
    occ:       ic.occ.on?roundBy(laborBr*ic.occ.rate):0,              // 職災：雇主全負擔
    pension:   ic.pension.on?roundBy(pensionBase*ic.pension.rate):0,   // 勞退：雇主 6%（用提繳工資，非勞保級距）
    healthSelf: ic.health.on?roundBy(healthBase*ic.health.rate*0.3*(1+dep)):0, // 健保：員工自付×(1+眷屬)
    healthEmp:  ic.health.on?roundBy(healthBase*ic.health.rate*0.6):0, // 雇主約 60%
    dep
  };
}
function calcPay(e){
  const base=e.type==='兼職'?e.base*160:e.base;   // 兼職以 160h 估
  const ins=insDetail(e); const ic=store.insCfg;
  const li=ins.laborSelf, hi=ins.healthSelf;      // 自付額（含眷屬）
  const ptFactor=e.partTime?0.5:1;                // 部分工時：本薪/加班按比例（示範係數）
  const ov=e.payOverrides||{};
  let earn=0, deduct=0, taxable=0, insured=0; const lines=[];
  store.payItems.filter(i=>i.on && ov[i.id]!=='off').forEach(i=>{
    let v=0;
    if(i.mode==='base') v=Math.round(base*ptFactor);
    else if(i.mode==='auto'){ const at=attend(e.id); const hourly=e.type==='兼職'?e.base:Math.round(e.base/240); v=Math.round(at.ot*hourly*store.attendCfg.ot1); }
    else if(i.mode==='formula') v=store.bonus[e.id]||0;
    else if(i.mode==='fixed') v=(ov[i.id]!==undefined&&ov[i.id]!=='off')?+ov[i.id]:i.val;   // 個別發薪科目金額覆寫
    else if(i.mode==='insurance') v=(i.name.indexOf('健保')>=0?hi:li);
    if(v===0 && i.mode!=='base') return;
    v=(i.round==='floor')?Math.floor(v):(i.round==='ceil')?Math.ceil(v):v;
    lines.push({name:i.name,type:i.type,val:v});
    if(i.type==='earn'){ earn+=v; if(i.tax) taxable+=v; if(i.insured) insured+=v; } else deduct+=v;
  });
  // 墊付款核銷（加項，不課稅不計保）：已核准的墊付併入撥款
  const adv=(typeof approvedAdvance==='function')?approvedAdvance(e.id):0;
  if(adv>0){ earn+=adv; lines.push({name:'墊付款核銷',type:'earn',val:adv}); }
  // 福利金（扣項）
  if(store.payrollCfg.welfareFund>0){ deduct+=store.payrollCfg.welfareFund; lines.push({name:'員工福利金',type:'deduct',val:store.payrollCfg.welfareFund}); }
  // 二代健保補充保費（示範：獎金類超過投保額 4 倍才計，這裡簡化為對 suppl 項目課 2.11%）
  if(store.payrollCfg.supplPremium){ const supBase=lines.filter(l=>{const it=store.payItems.find(x=>x.name===l.name);return it&&it.suppl;}).reduce((s,l)=>s+l.val,0);
    const sup=roundBy(supBase*ic.suppl.rate); if(sup>0){ deduct+=sup; lines.push({name:'補充保費',type:'deduct',val:sup}); } }
  return {e,earn,deduct,net:earn-deduct,lines,taxable,insured};
}

        ${earns.map(l=>`<div class="between" style="font-size:13px"><span>${l.name}</span><span>${nt(l.val)}</span></div>`).join('')||'<div class="small">—</div>'}
        <div style="font-weight:700;color:var(--warn);font-size:12px;margin:8px 0 4px">應扣項目</div>
        ${deds.map(l=>`<div class="between" style="font-size:13px;color:var(--warn)"><span>${l.name}</span><span>-${nt(l.val)}</span></div>`).join('')||'<div class="small">—</div>'}</div>
    </div></div>
    <p class="note" style="margin-top:12px">完整逐項明細（含加給/獎金/墊付核銷/勞健保/補充保費/福利金）即時由薪資計算產出，金額一致；推播 LINE、加密僅本人可查。</p></div>`);
  }
  return page('K','電子薪資條','Digital Payslip',`<div class="card"><div class="between"><h2 style="margin:0">📤 薪資條發放</h2>
    <button class="btn sm" onclick="pushPayslips()">批次推播全部</button></div>
    <div class="tbl-wrap" style="margin-top:12px"><table><tr><th>姓名</th><th>分店</th><th>期別</th><th>狀態</th><th></th></tr>
    ${EMP.filter(e=>e.state==='在職').map(e=>`<tr><td>${e.name}</td><td>${storeName(e.store)}</td><td>2026/06</td><td><span class="pill p-hold">待推播</span></td><td><button class="btn sm ghost" onclick="payslip('${e.id}')">預覽</button></td></tr>`).join('')}</table></div>
    <p class="note" style="margin-top:12px">與薪資計算同源、金額一致不出錯。加密後個人 LINE 可查，保護薪資隱私。</p></div>`);
};

// L 數據儀表板
PANELS.L=(me)=>{
  // 由真實持久化資料即時計算
  const active=EMP.filter(e=>e.state==='在職');
  const pays=active.map(calcPay);
  const avgWage=pays.length?Math.round(pays.reduce((s,p)=>s+p.earn,0)/pays.length):0;
  const totalLabor=pays.reduce((s,p)=>s+p.earn,0);
  const totalRev=store.sales.reduce((s,r)=>s+r.amt,0)*30;   // 由業績回報即時彙整·以日營業額估月營收
  const laborRate=totalRev?Math.round(totalLabor/totalRev*1000)/10:0;
  const pendApprovals=store.approvals.filter(a=>a.state==='待核').length;
  // 各店在職人數（真實）
  const byStore=TENANTS[currentTenant].stores.map((s,i)=>[s,active.filter(e=>e.store===i).length]);
  const mx=Math.max(1,...byStore.map(b=>b[1]));
  return page('L','數據產出 / 儀表板','Analytics & Compliance',`
  <div class="grid g4" style="margin-bottom:12px">
    <div class="stat"><div class="k">人事成本率（估）</div><div class="v">${laborRate}%</div><div class="d pill ${laborRate<=30?'p-ok':'p-warn'}">${laborRate<=30?'健康區間':'偏高'}</div></div>
    <div class="stat"><div class="k">平均應發薪資</div><div class="v" style="font-size:20px">${nt(avgWage)}</div><div class="d">由薪資計算即時彙總</div></div>
    <div class="stat"><div class="k">待簽核</div><div class="v">${pendApprovals}</div><div class="d">跨全店</div></div>
    <div class="stat"><div class="k">總人力</div><div class="v">${active.length}</div><div class="d">在職 / 共 ${EMP.length}</div></div>
  </div>
  <div class="card"><h2>👥 各店在職人數（即時）</h2>
    <div style="display:flex;align-items:flex-end;gap:16px;height:170px;padding:10px 0">
    ${byStore.map(b=>`<div style="flex:1;text-align:center"><div style="font-weight:700;margin-bottom:4px">${b[1]} 人</div>
      <div style="height:${Math.round(b[1]/mx*120)}px;min-height:4px;background:linear-gradient(180deg,var(--brand),var(--brand-d));border-radius:8px 8px 0 0"></div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px">${b[0]}</div></div>`).join('')}
    </div>
    <p class="lead" style="margin-top:6px">人數、平均薪資、人事成本率皆由員工主檔＋薪資計算即時產出，非固定數字。</p>
  </div>
  <div class="grid g2">
    <div class="card"><h2>🧾 法遵報表一鍵產出</h2>
      <div class="row">${['出勤','工時','加班','投保級距稽核'].map(x=>`<button class="btn sm ghost" onclick="toast('（示範）已匯出 ${x} 報表')">${x}</button>`).join('')}</div>
      <p class="note" style="margin-top:12px">對齊勞檢需求，隨時備查。</p></div>
    <div class="card"><h2>🧮 資遣費 / 平均薪資試算</h2>
      <p class="lead">月日制 30日/月，對齊勞動部。</p>
      <div class="row"><button class="btn sm ghost" onclick="toast('（示範）資遣費試算 → 匯出 Excel/PDF')">資遣費試算</button><button class="btn sm ghost" onclick="toast('（示範）平均薪資 → 投保調級/加薪評估')">平均薪資</button></div></div>
  </div>`);
};

// SET 系統設置
PANELS.SET=(me)=>{
  const t=TENANTS[currentTenant];
  return page('SET','系統設置','Settings（僅管理員）',`
  <div class="grid g2">
    <div class="card"><h2>🏢 租戶 / 公司設定</h2>
      <div class="field"><label class="f">租戶名稱</label><input value="${t.name}" onchange="setTenant('name',this.value)"></div>
      <div class="field"><label class="f">綁定 LINE 官方帳號</label><input value="${t.line}" onchange="setTenant('line',this.value)"></div>
      <div class="row">${kv('分店數',t.stores.length+' 家')}${kv('方案','企業版（多店）')}</div>
      <p class="note" style="margin-top:12px">每個租戶（客戶）資料完全隔離、綁自己的 LINE 官方帳號。改這裡即時生效並存檔。</p>
    </div>
    <div class="card"><div class="between"><h2 style="margin:0">🏬 分店管理</h2><button class="btn sm" onclick="addStore()">＋ 新增分店</button></div>
      <div style="margin-top:10px">${t.stores.map((s,i)=>`<div class="between" style="padding:6px 0;border-bottom:1px solid var(--line)">
        <input value="${s}" style="border:none;background:none;font-weight:600;flex:1" onchange="renameStore(${i},this.value)">
        <div class="row"><button class="btn sm ghost" onclick="go('BSET')">GPS/班別</button>${t.stores.length>1?`<button class="btn sm warn" onclick="delStore(${i})">🗑</button>`:''}</div></div>`).join('')}</div>
      <p class="note" style="margin-top:10px">新增/改名/刪除分店即時生效並存檔，套用到打卡 GPS、排班、業績、儀表板全系統。</p>
    </div>
  </div>
  <div class="card"><div class="between"><h2 style="margin:0">🧩 員工自訂欄位</h2><button class="btn sm" onclick="addCustomField()">＋ 新增欄位</button></div>
    <div style="margin-top:10px">${store.customFields.length?store.customFields.map((f,i)=>`<div class="between" style="padding:6px 0;border-bottom:1px solid var(--line)"><input value="${f.label}" style="border:none;background:none;flex:1" onchange="renameField(${i},this.value)"><button class="btn sm warn" onclick="delField(${i})">🗑</button></div>`).join(''):'<div class="small" style="color:var(--muted)">尚無自訂欄位</div>'}</div>
    <p class="note" style="margin-top:10px">客戶可自訂員工建檔要收的額外欄位（如制服尺寸、車牌）——新增後出現在「員工基本資料」的新增/編輯表單。</p>
  </div>
  <div class="card" id="permMatrix"><h2>🔐 模組權限設定（A–N，逐格可開關·即時生效）</h2>
    <div class="tbl-wrap"><table class="matrix"><tr><th>模組 ＼ 角色</th><th>員工</th><th>主管</th><th>人資</th><th>管理員</th></tr>
    ${MODS.filter(m=>m.k&&m.k!=='home').map(m=>`<tr><td style="text-align:left">${m.tag} ${m.name}</td>
      ${['employee','supervisor','hr','admin'].map(r=>`<td><label class="switch"><input type="checkbox" ${permEffective(r,m.k)?'checked':''} onchange="setPerm('${r}','${m.k}',this.checked)"><span></span></label></td>`).join('')}</tr>`).join('')}</table></div>
    <p class="note" style="margin-top:12px">👉 <b>這裡就是設定「員工 A–L＋N 各模組權限」的地方</b>：逐格開關「哪個角色能用哪個模組」，關掉後該角色左側選單就看不到、也進不去（即時生效）。這是多租戶產品讓客戶自助設定的核心。</p>
  </div>
  <div class="card"><h2>🧩 各模組規則設定</h2>
    <div class="grid g3">
      ${[['假別政策','E'],['考核 / 獎金公式','G'],['投保級距表','I'],['薪資計算規則','J'],['打卡 GPS 範圍','B'],['自訂欄位','A']].map(x=>`<button class="btn ghost" style="justify-content:flex-start" onclick="go('${x[1]}')">${x[0]} →</button>`).join('')}
    </div>
    <p class="note" style="margin-top:12px">所有規則都做成「資料可設定」而非「程式寫死」——接新客戶不必改程式碼。</p>
  </div>`);
};
window.setPerm=(role,mod,v)=>{ store.perm[role]=store.perm[role]||{}; store.perm[role][mod]=v; save(); toast('已更新「'+ROLES[role].name+'」的「'+(MODS.find(m=>m.k===mod)||{}).name+'」權限'); if(role===currentRole) render(); };
window.setTenant=(f,v)=>{ TENANTS[currentTenant][f]=v; store.tenantMeta[currentTenant]=store.tenantMeta[currentTenant]||{}; store.tenantMeta[currentTenant][f]=v; save();
  if(f==='name'){ document.getElementById('tenantSel').options[[...document.getElementById('tenantSel').options].findIndex(o=>o.value===currentTenant)].text=v; } toast('租戶設定已更新'); };
function persistStores(){ store.tenantStores[currentTenant]=TENANTS[currentTenant].stores.slice(); save(); }
window.addStore=()=>{ TENANTS[currentTenant].stores.push('新分店 '+(TENANTS[currentTenant].stores.length+1)); persistStores(); toast('已新增分店'); render(); };
window.renameStore=(i,v)=>{ TENANTS[currentTenant].stores[i]=v.trim()||TENANTS[currentTenant].stores[i]; persistStores(); toast('分店已改名'); };
window.delStore=(i)=>{ if(TENANTS[currentTenant].stores.length<=1){ toast('至少保留一間'); return; } if(!confirm('刪除分店「'+TENANTS[currentTenant].stores[i]+'」？')) return; TENANTS[currentTenant].stores.splice(i,1); persistStores(); toast('已刪除分店'); render(); };
window.addCustomField=()=>{ store.customFields.push({label:'新欄位'}); save(); toast('已新增自訂欄位'); render(); };
window.renameField=(i,v)=>{ store.customFields[i].label=v.trim()||store.customFields[i].label; save(); };
window.delField=(i)=>{ store.customFields.splice(i,1); save(); toast('已刪除欄位'); render(); };

// 真實 CSV 匯出（觸發下載）
window.exportCSV=(kind)=>{ let head=[],rows=[],fn='export.csv';
  if(kind==='attendance'){ fn='考勤彙總.csv'; head=['員工','出勤天數','遲到次數','遲到分鐘','早退','加班時數','加班費'];
    rows=EMP.filter(e=>e.state==='在職').map(e=>{const at=attend(e.id);const h=e.type==='兼職'?e.base:Math.round(e.base/240);return [e.name,at.days,at.late,at.lateMin,at.early,at.ot,Math.round(at.ot*h*store.attendCfg.ot1)];}); }
  else if(kind==='payroll'){ fn='薪資總表.csv'; head=['員工','分店','應發','應扣','實發','薪轉帳戶'];
    rows=EMP.filter(e=>e.state==='在職').map(e=>{const p=calcPay(e);return [e.name,storeName(e.store),p.earn,p.deduct,p.net,e.bank];}); }
  else if(kind==='roster'){ fn='員工名冊.csv'; head=['員編','姓名','分店','部門','職稱','型態','狀態'];
    rows=EMP.map(e=>[e.id,e.name,storeName(e.store),e.dept,e.title,e.type,e.state]); }
  else if(kind==='overtime'){ fn='加班時數清冊.csv'; head=['員工','分店','本月加班時數','加班費','當日工時','當日加班'];
    rows=EMP.filter(e=>e.state==='在職').map(e=>{const at=attend(e.id);const pa=punchAnalysis(e);const h=e.type==='兼職'?e.base:Math.round(e.base/240);return [e.name,storeName(e.store),at.ot,Math.round(at.ot*h*store.attendCfg.ot1),pa.worked==null?'-':pa.worked,pa.ot];}); }
  else if(kind==='training'){ fn='教育訓練時數.csv'; head=['員工','分店',...store.courses.map(c=>c.name),'完訓總時數'];
    rows=EMP.filter(e=>e.state==='在職').map(e=>{let h=0;const cells=store.courses.map(c=>{const s=trainStatus(e.id,c.id);if(s==='完成')h+=c.hours;return s;});return [e.name,storeName(e.store),...cells,h+'h'];}); }
  else if(kind==='insurance'){ fn='加退保級距清冊.csv'; head=['員工','投保單位','投保薪資','勞保自付','職災(雇主)','勞退(雇主)','健保自付','眷屬','到職日'];
    rows=EMP.filter(e=>e.state==='在職').map(e=>{const d=insDetail(e);return [e.name,store.insCfg.unitName,d.br,d.laborSelf,d.occ,d.pension,d.healthSelf,d.dep,e.start];}); }
  const csv='﻿'+[head.join(','),...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=fn; a.click(); toast('已匯出 '+fn); };
// 勞檢總表列印（開新視窗 → 列印/存 PDF）
window.printLaborPack=()=>{ const roster=EMP.filter(e=>e.state==='在職');
  const tbl=(cap,head,rows)=>`<h3>${cap}</h3><table><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table>`;
  const att=tbl('一、出勤與加班紀錄',['員工','出勤天數','遲到','加班時數'],roster.map(e=>{const at=attend(e.id);return[e.name,at.days,at.late,at.ot+'h'];}));
  const trn=tbl('二、教育訓練時數',['員工',...store.courses.map(c=>c.name),'總時數'],roster.map(e=>{let h=0;const cs=store.courses.map(c=>{const s=trainStatus(e.id,c.id);if(s==='完成')h+=c.hours;return s;});return[e.name,...cs,h+'h'];}));
  const ins=tbl('三、加退保級距',['員工','投保薪資','勞保自付','健保自付'],roster.map(e=>{const d=insDetail(e);return[e.name,d.br,d.laborSelf,d.healthSelf];}));
  const pay=tbl('四、薪資清冊',['員工','應發','應扣','實發'],roster.map(e=>{const p=calcPay(e);return[e.name,nt(p.earn),nt(p.deduct),nt(p.net)];}));
  const doc=`<!doctype html><meta charset=utf-8><title>勞動檢查報表包 · ${TENANTS[currentTenant].name}</title>
  <style>body{font-family:"Microsoft JhengHei",sans-serif;padding:24px;color:#152019}h1{font-size:20px}h3{margin:20px 0 6px;color:#12673a;border-bottom:2px solid #12673a;padding-bottom:3px}table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}th,td{border:1px solid #ccc;padding:5px 7px;text-align:left}th{background:#e7f4ec}@media print{button{display:none}}</style>
  <h1>勞動檢查報表包</h1><div>單位：${store.insCfg.unitName||TENANTS[currentTenant].name}　列印日：2026/07/07　在職 ${roster.length} 人</div>
  <button onclick="print()" style="margin:12px 0;padding:8px 16px">🖨 列印 / 存 PDF</button>
  ${att}${trn}${ins}${pay}
  <p style="margin-top:20px;font-size:11px;color:#888">益循 HRM 系統產出 · 供勞動檢查參考</p>`;
  const w=window.open('','_blank'); if(!w){ toast('請允許彈出視窗以列印'); return; } w.document.write(doc); w.document.close(); toast('已開啟勞檢報表包'); };

// ---------- 小工具 ----------
function page(tag,name,en,inner){ return `<h1 class="pt"><span class="tag" style="width:30px;height:30px;font-size:15px">${tag}</span>${name} <span class="en">${en}</span></h1>${inner}`; }
function kv(k,v){ return `<div class="field"><label class="f">${k}</label><div style="font-weight:600">${v}</div></div>`; }

// live clock on B
setInterval(()=>{ const c=document.getElementById('clk'); if(c){ const n=new Date(); c.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); } },1000);

boot();
</script>
</body>
</html>
